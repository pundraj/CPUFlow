apiVersion: apps/v1
kind: Deployment

metadata:
  name: cpuflow-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cpuflow-backend

  template:
    metadata:
      labels:
        app: cpuflow-backend

    spec:
      containers:
      - name: backend
        image: rajz23/cpuflow-backend:v1

        ports:
        - containerPort: 8000
